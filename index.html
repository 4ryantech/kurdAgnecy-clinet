    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000;
        }

        body { 
            background-image: 
                radial-gradient(circle at 50% -20%, #1a3a5f, transparent),
                radial-gradient(circle at 0% 100%, #0a1520, transparent);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #fff;
        }

        .main-wrapper {
            width: 100%; 
            height: 100%; /* پڕ بە شاشە */
            max-width: 500px;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* بەشەکان بە جوانی بڵاو دەکاتەوە */
            text-align: center;
            position: relative;
        }

        .top-brand-small {
            font-size: 0.75rem;
            font-weight: 800;
            color: #4facfe;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .call-icon-main {
            font-size: 5rem;
            color: #25D366;
            filter: drop-shadow(0 0 15px rgba(37, 211, 102, 0.4));
            animation: mainPulse 2s infinite ease-in-out;
        }

        @keyframes mainPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .instruction {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.4;
        }

        .scroll-icon {
            font-size: 2.2rem;
            color: #4facfe;
            animation: moveDown 1.5s infinite ease-in-out;
        }

        @keyframes moveDown {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(15px); opacity: 1; }
        }

        .link-item {
            display: flex; 
            align-items: center;
            padding: 22px;
            background: rgba(37, 211, 102, 0.2);
            border: 2px solid rgba(37, 211, 102, 0.5);
            border-radius: 30px;
            text-decoration: none;
            color: #fff;
            font-weight: 800;
            font-size: 1.4rem;
            transition: 0.2s;
            animation: shake 4s infinite;
        }

        @keyframes shake {
            0%, 90%, 100% { transform: scale(1); }
            95% { transform: scale(1.05); }
        }

        .link-item:active { transform: scale(0.95); }
        .link-item i { font-size: 2.5rem; margin-left: 15px; color: #25D366; }
        .link-item span { flex-grow: 1; text-align: right; }

        .footer-section {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            text-decoration: none;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-brand { 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: #fff;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.5);
        }

        .footer-slogan { font-size: 0.9rem; color: #ccc; margin-top: 5px; }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="top-brand-small">Kurd Agency</div>

        <div class="header-section">
            <div class="call-icon-main"><i class="fab fa-whatsapp"></i></div>
            <p class="instruction">بۆ پەیوەندی کردن ئێرە دابگرە</p>
            <div class="scroll-icon"><i class="fas fa-chevron-down"></i></div>
        </div>

        <div class="center-content">
            <a href="https://wa.me/9647702248917" class="link-item" onclick="ttq.track('CompletePayment');">
                <i class="fab fa-whatsapp"></i> <span>واتسئەپ</span>
            </a>
        </div>

        <a href="https://wa.me/9647729585559" class="footer-section" onclick="ttq.track('Contact');">
            <div class="footer-brand">KURD AGENCY</div>
            <p class="footer-slogan">گەورەکردنی کارەکەت لەگەڵ ئێمە ئاسانە</p>
        </a>
    </div>

</body>
