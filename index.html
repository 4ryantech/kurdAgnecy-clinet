    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #000;
            background-image: 
                radial-gradient(circle at 50% -20%, #1a3a5f, transparent),
                radial-gradient(circle at 0% 100%, #0a1520, transparent);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #fff; padding: 15px;
            overflow: hidden;
        }

        .main-wrapper {
            width: 100%; max-width: 400px;
            height: 85vh; 
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 40px 25px;
            text-align: center;
            backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .top-brand-small {
            position: absolute;
            top: 30px;
            right: 35px;
            font-size: 0.75rem;
            font-weight: 800;
            color: #4facfe;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .call-icon-main {
            font-size: 5rem;
            color: #0088cc;
            margin-top: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 25px rgba(0, 136, 204, 0.5));
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .instruction {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            margin-top: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .scroll-icon {
            font-size: 2rem;
            color: #4facfe;
            margin-top: 10px;
            animation: moveDown 2s infinite ease-in-out;
        }

        @keyframes moveDown {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(12px); opacity: 1; }
        }

        .links-list { 
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .link-item {
            display: flex; align-items: center;
            padding: 25px 30px;
            background: rgba(0, 136, 204, 0.15);
            border: 1px solid rgba(0, 136, 204, 0.4);
            border-radius: 30px;
            text-decoration: none;
            color: #fff;
            font-weight: 800;
            font-size: 1.3rem;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.2);
        }

        .link-item:active { transform: scale(0.95); }

        .link-item i { 
            font-size: 2.5rem; 
            margin-left: 20px; 
            color: #fff;
        }

        .link-item span { flex-grow: 1; text-align: right; }

        .footer-section {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-brand { 
            font-size: 1.6rem; 
            font-weight: 900; 
            color: #fff;
            text-shadow: 0 0 15px rgba(79, 172, 254, 0.6);
        }

        .footer-slogan { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
    </style>

    <div class="main-wrapper">

            <p class="instruction">بۆ جۆین کردن ئێرە دابگرە</p>
            <div class="scroll-icon"><i class="fas fa-chevron-down"></i></div>
        </div>

        <div class="links-list">
            <a href="https://t.me/+q7OO-8RQDW84Nzgy" class="link-item" onclick="ttq.track('Contact');">
                <i class="fab fa-telegram-plane"></i> <span>جۆین بە لە تێلگرام</span>
            </a>
        </div>

        <div class="footer-section">
            <div class="footer-brand">KURD AGENCY</div>
            <p class="footer-slogan">گەورەکردنی کارەکەت لەگەڵ ئێمە ئاسانە</p>
        </div>
    </div>
